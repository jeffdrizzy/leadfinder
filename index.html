<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadFinder</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #0f172a; color: white; padding: 20px; max-width: 800px; margin: auto; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #1e2937; border: 1px solid #475569; border-radius: 8px; color: white; font-size: 17px; }
        button { padding: 15px 25px; margin: 5px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-size: 16px; }
        .lead { background: #1e2937; padding: 15px; margin: 10px 0; border-radius: 8px; }
    </style>
</head>
<body>
    <h1 style="text-align:center">LeadFinder</h1>
    <p style="text-align:center">Premium Reddit Lead Generator</p>

    <input type="text" id="keyword" value="plumber" placeholder="plumber OR electrician">
    <button onclick="searchLeads()">🔍 Search</button>
    <button onclick="loadSavedLeads()">📂 Saved Leads</button>
    <button onclick="exportCSV()">📤 Export CSV</button>

    <div id="results"></div>
    <div id="saved"></div>

    <script>
        async function searchLeads() {
            const q = document.getElementById('keyword').value.trim();
            const results = document.getElementById('results');
            results.innerHTML = '<p>Searching Reddit...</p>';
            try {
                const res = await fetch('/api/search?q=' + encodeURIComponent(q));
                const posts = await res.json();
                let html = '';
                posts.forEach(p => {
                    html += `<div class="lead"><b>\( {p.title}</b><br>r/ \){p.subreddit} - <a href="\( {p.url}" target="_blank">View</a><br><small> \){p.snippet}</small><br><button onclick="saveLead('\( {p.title.replace(/'/g,"\\'")}', ' \){p.subreddit}', '\( {p.url}', ' \){p.snippet.replace(/'/g,"\\'")}')">Save Lead</button></div>`;
                });
                results.innerHTML = html || '<p>No results.</p>';
            } catch(e) {
                results.innerHTML = '<p class="error">Error. Try again.</p>';
            }
        }

        async function saveLead(title, subreddit, url, snippet) {
            await fetch('/api/save', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({title, subreddit, url, snippet}) });
            alert('✅ Saved!');
        }

        async function loadSavedLeads() {
            const res = await fetch('/api/leads');
            const leads = await res.json();
            let html = '<h2>Saved Leads</h2>';
            leads.forEach(l => html += `<div class="lead"><b>\( {l.title}</b><br>r/ \){l.subreddit}</div>`);
            document.getElementById('saved').innerHTML = html;
        }

        async function exportCSV() {
            const res = await fetch('/api/leads');
            const leads = await res.json();
            let csv = 'Title,Subreddit,URL,Snippet\n';
            leads.forEach(l => csv += `"\( {l.title}"," \){l.subreddit}","\( {l.url}"," \){l.snippet}"\n`);
            const blob = new Blob([csv], {type: 'text/csv'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'leads.csv';
            a.click();
        }
    </script>
</body>
</html>
