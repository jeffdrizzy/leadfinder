<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadFinder</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; margin: 0; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .logo { font-size: 48px; font-weight: 700; background: linear-gradient(90deg, #60a5fa, #a78bfa, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin-bottom: 10px; }
        h1 { text-align: center; color: #e0f2fe; margin-bottom: 30px; }
        input { width: 100%; padding: 18px; font-size: 18px; background: #1e2937; border: 2px solid #334155; border-radius: 16px; color: white; margin-bottom: 20px; }
        button { padding: 16px 28px; font-size: 16px; font-weight: 600; border-radius: 16px; cursor: pointer; margin: 5px; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(90deg, #3b82f6, #6366f1); color: white; border: none; }
        .btn-secondary { background: #334155; color: #e2e8f0; border: 2px solid #475569; }
        .lead { background: #1e2937; padding: 20px; margin: 15px 0; border-radius: 20px; border-left: 5px solid #60a5fa; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3); }
        .lead:hover { transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">LeadFinder</div>
        <h1>Premium Reddit Lead Generator</h1>

        <input type="text" id="keyword" placeholder="plumber OR roofer OR electrician" value="plumber">
        <button class="btn-primary" onclick="searchLeads()">🔍 Search Leads</button>
        <button class="btn-secondary" onclick="loadSavedLeads()">📂 Saved Leads</button>
        <button class="btn-secondary" onclick="exportCSV()">📤 Export CSV</button>

        <div id="results"></div>
        <div id="saved"></div>
    </div>

    <script>
        async function searchLeads() {
            const q = document.getElementById('keyword').value.trim();
            document.getElementById('results').innerHTML = '<p style="text-align:center">Searching Reddit for high-intent leads...</p>';
            try {
                const res = await fetch('/api/search?q=' + encodeURIComponent(q));
                const posts = await res.json();
                let html = '';
                posts.forEach(p => {
                    html += `<div class="lead"><strong>\( {p.title}</strong><br><span style="color:#94a3b8">r/ \){p.subreddit}</span> • <a href="\( {p.url}" target="_blank" style="color:#60a5fa">View on Reddit</a><br><small> \){p.snippet}</small><br><button style="background:#10b981;color:white;padding:8px 16px;border:none;border-radius:8px;cursor:pointer" onclick="saveLead('\( {p.title.replace(/'/g,"\\'")}', ' \){p.subreddit}', '\( {p.url}', ' \){p.snippet.replace(/'/g,"\\'")}')">💾 Save Lead</button></div>`;
                });
                document.getElementById('results').innerHTML = html || '<p>No results. Try different keywords.</p>';
            } catch(e) {
                document.getElementById('results').innerHTML = '<p style="color:#f87171">Error connecting to server. Make sure it's running.</p>';
            }
        }

        async function saveLead(title, subreddit, url, snippet) {
            await fetch('/api/save', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({title, subreddit, url, snippet}) });
            alert('✅ Lead Saved!');
        }

        async function loadSavedLeads() {
            const res = await fetch('/api/leads');
            const leads = await res.json();
            let html = '<h2 style="margin-top:30px;color:#e0f2fe">Saved Leads</h2>';
            leads.forEach(l => html += `<div class="lead"><strong>\( {l.title}</strong><br>r/ \){l.subreddit}</div>`);
            document.getElementById('saved').innerHTML = html;
        }

        async function exportCSV() {
            const res = await fetch('/api/leads');
            const leads = await res.json();
            let csv = 'Title,Subreddit,URL,Snippet,Timestamp\n';
            leads.forEach(l => csv += `"\( {l.title}"," \){l.subreddit}","\( {l.url}"," \){l.snippet}","${l.timestamp}"\n`);
            const blob = new Blob([csv], {type: 'text/csv'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'leads.csv';
            a.click();
        }
    </script>
</body>
</html>
