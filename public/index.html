<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadFinder</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; margin: 0; background: #0f172a; color: #e2e8f0; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .logo { font-size: 48px; font-weight: 700; background: linear-gradient(90deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; }
        input { width: 100%; padding: 18px; background: #1e2937; border: 2px solid #475569; border-radius: 16px; color: white; font-size: 17px; }
        button { padding: 16px 28px; font-size: 16px; font-weight: 600; border-radius: 16px; cursor: pointer; margin: 5px; }
        .btn-primary { background: linear-gradient(90deg, #3b82f6, #6366f1); color: white; border: none; }
        .lead { background: #1e2937; padding: 20px; margin: 15px 0; border-radius: 20px; border-left: 5px solid #60a5fa; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">LeadFinder</div>
        <h1 class="text-center text-3xl font-semibold mt-2 mb-8">Premium Reddit Lead Generator</h1>

        <input type="text" id="keyword" placeholder="plumber OR electrician" value="plumber" class="mb-6">
        <button onclick="searchLeads()" class="btn-primary">🔍 Search Leads</button>
        <button onclick="loadSavedLeads()" class="bg-zinc-800">📂 Saved Leads</button>
        <button onclick="exportCSV()" class="bg-zinc-800">📤 Export CSV</button>

        <div id="results" class="mt-8"></div>
        <div id="saved" class="mt-8"></div>
    </div>

    <script>
        async function searchLeads() {
            const q = document.getElementById('keyword').value.trim();
            const results = document.getElementById('results');
            results.innerHTML = '<p class="text-center">Searching...</p>';
            try {
                const res = await fetch('/api/search?q=' + encodeURIComponent(q));
                const posts = await res.json();
                let html = '';
                posts.forEach(p => {
                    html += `<div class="lead"><strong>\( {p.title}</strong><br><span class="text-blue-400">r/ \){p.subreddit}</span> • <a href="\( {p.url}" target="_blank">View</a><br><small> \){p.snippet}</small><br><button onclick="saveLead('\( {p.title.replace(/'/g,"\\'")}', ' \){p.subreddit}', '\( {p.url}', ' \){p.snippet.replace(/'/g,"\\'")}')" class="mt-4 bg-emerald-600 px-6 py-2 rounded-xl">Save Lead</button></div>`;
                });
                results.innerHTML = html;
            } catch(e) {
                results.innerHTML = '<p class="text-red-400">Error. Server running?</p>';
            }
        }

        async function saveLead(title, subreddit, url, snippet) {
            await fetch('/api/save', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({title, subreddit, url, snippet}) });
            alert('Saved!');
        }

        async function loadSavedLeads() {
            const res = await fetch('/api/leads');
            const leads = await res.json();
            let html = '<h2 class="text-2xl font-semibold mb-4">Saved Leads</h2>';
            leads.forEach(l => html += `<div class="lead"><strong>\( {l.title}</strong><br>r/ \){l.subreddit}</div>`);
            document.getElementById('saved').innerHTML = html;
        }

        async function exportCSV() {
            const res = await fetch('/api/leads');
            const leads = await res.json();
            let csv = 'Title,Subreddit,URL,Snippet\n';
            leads.forEach(l => csv += `"\( {l.title}"," \){l.subreddit}","\( {l.url}"," \){l.snippet}"\n`);
            const blob = new Blob([csv], {type: 'text/csv'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'leads.csv';
            a.click();
        }
    </script>
</body>
</html>
