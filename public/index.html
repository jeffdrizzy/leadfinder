<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadFinder</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; margin: 0; background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%); color: #1e2937; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .logo { font-size: 42px; font-weight: 700; background: linear-gradient(90deg, #3b82f6, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input { width: 100%; padding: 16px 20px; font-size: 17px; border: 2px solid #e2e8f0; border-radius: 16px; background: white; margin: 10px 0; }
        button { padding: 16px 24px; font-size: 16px; font-weight: 600; border: none; border-radius: 16px; cursor: pointer; margin: 5px; }
        .btn-primary { background: linear-gradient(90deg, #3b82f6, #6366f1); color: white; }
        .lead { background: white; padding: 20px; margin: 12px 0; border-radius: 20px; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">LeadFinder</div>
        <h1>Reddit Lead Generator</h1>

        <input type="text" id="keyword" placeholder="plumber OR electrician" value="plumber">
        <button class="btn-primary" onclick="searchLeads()">🔍 Search</button>
        <button onclick="loadSavedLeads()">Saved Leads</button>
        <button onclick="exportCSV()">Export CSV</button>

        <div id="results"></div>
        <div id="saved"></div>
    </div>

    <script>
        async function searchLeads() {
            const q = document.getElementById('keyword').value.trim();
            document.getElementById('results').innerHTML = '<p>Searching...</p>';
            try {
                const res = await fetch('/api/search?q=' + encodeURIComponent(q));
                const posts = await res.json();
                let html = '';
                posts.forEach(p => {
                    html += `<div class="lead"><strong>\( {p.title}</strong><br>r/ \){p.subreddit} • <a href="\( {p.url}" target="_blank">View</a><br><small> \){p.snippet}</small><br><button onclick="saveLead('\( {p.title.replace(/'/g,"\\'")}', ' \){p.subreddit}', '\( {p.url}', ' \){p.snippet.replace(/'/g,"\\'")}')">Save Lead</button></div>`;
                });
                document.getElementById('results').innerHTML = html;
            } catch(e) {
                document.getElementById('results').innerHTML = '<p>Error. Server running?</p>';
            }
        }

        async function saveLead(title, subreddit, url, snippet) {
            await fetch('/api/save', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({title, subreddit, url, snippet}) });
            alert('Saved!');
        }

        async function loadSavedLeads() {
            const res = await fetch('/api/leads');
            const leads = await res.json();
            let html = '<h2>Saved Leads</h2>';
            leads.forEach(l => html += `<div class="lead"><strong>\( {l.title}</strong><br>r/ \){l.subreddit}</div>`);
            document.getElementById('saved').innerHTML = html;
        }

        async function exportCSV() {
            const res = await fetch('/api/leads');
            const leads = await res.json();
            let csv = 'Title,Subreddit,URL,Snippet\n';
            leads.forEach(l => csv += `"\( {l.title}"," \){l.subreddit}","\( {l.url}"," \){l.snippet}"\n`);
            const blob = new Blob([csv], {type: 'text/csv'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'leads.csv';
            a.click();
        }
    </script>
</body>
</html>
