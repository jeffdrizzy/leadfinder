<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadFinder</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #0f172a; color: white; padding: 20px; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #1e2937; border: 1px solid #475569; border-radius: 8px; color: white; }
        button { padding: 15px; margin: 5px; background: #3b82f6; color: white; border: none; border-radius: 8px; }
        .lead { background: #1e2937; padding: 15px; margin: 10px 0; border-radius: 8px; }
        .error { color: #f87171; }
    </style>
</head>
<body>
    <h1>LeadFinder</h1>
    <input type="text" id="keyword" value="" placeholder="Search keyword">
    <button onclick="searchLeads()">Search</button>
    <button onclick="loadSavedLeads()">Saved</button>
    <button onclick="exportCSV()">Export CSV</button>

    <div id="results"></div>
    <div id="saved"></div>

    <script>
        async function safeFetch(url, options = {}) {
            try {
                const res = await fetch(url, options);
                if (!res.ok) throw new Error('Server error');
                return await res.json();
            } catch(e) {
                console.error(e);
                return null;
            }
        }

        async function searchLeads() {
            const q = document.getElementById('keyword').value.trim();
            const results = document.getElementById('results');
            results.innerHTML = '<p>Searching...</p>';
            const data = await safeFetch('/api/search?q=' + encodeURIComponent(q));
            if (data) {
                let html = '';
                data.forEach(p => {
                    html += `<div class="lead"><b>\( {p.title}</b><br>r/ \){p.subreddit} - <a href="\( {p.url}">Link</a><br><small> \){p.snippet}</small><br><button onclick="saveLead('\( {p.title.replace(/'/g,"\\'")}', ' \){p.subreddit}', '\( {p.url}', ' \){p.snippet.replace(/'/g,"\\'")}')">Save</button></div>`;
                });
                results.innerHTML = html || '<p>No results</p>';
            } else {
                results.innerHTML = '<p class="error">Search failed. Try again.</p>';
            }
        }

        async function saveLead(title, subreddit, url, snippet) {
            const result = await safeFetch('/api/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({title, subreddit, url, snippet})
            });
            if (result) alert('Saved!');
            else alert('Save failed');
        }

        async function loadSavedLeads() {
            const leads = await safeFetch('/api/leads');
            let html = '<h2>Saved Leads</h2>';
            if (leads) {
                leads.forEach(l => html += `<div class="lead"><b>\( {l.title}</b><br>r/ \){l.subreddit}</div>`);
            }
            document.getElementById('saved').innerHTML = html;
        }

        async function exportCSV() {
            const leads = await safeFetch('/api/leads');
            if (!leads) return alert('No leads');
            let csv = 'Title,Subreddit,URL,Snippet\n';
            leads.forEach(l => csv += `"\( {l.title}"," \){l.subreddit}","\( {l.url}"," \){l.snippet}"\n`);
            const blob = new Blob([csv], {type: 'text/csv'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'leads.csv';
            a.click();
        }
    </script>
</body>
</html>
